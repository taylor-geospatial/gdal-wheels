name: Build and publish GDAL wheels

# Builds standalone GDAL Python API (osgeo.gdal/ogr/osr) binary wheels for every
# OS/arch + Python version, with libgdal and all C dependencies vendored in, so
# `pip install gdal-wheels` Just Works with no system GDAL. Import package stays
# `osgeo`, so it is a drop-in for the official (sdist-only) GDAL package.
#
# Pipeline (per platform):
#   1. ci/fetch_gdal_src.sh        downloads GDAL's pip-ready sdist -> gdal-src/
#                                  and renames the distribution GDAL -> gdal-wheels
#   2. CIBW_BEFORE_ALL             builds libgdal + full C dep chain from source
#                                  (Linux/macOS via ci/config.sh); Windows uses vcpkg
#   3. cibuildwheel                builds gdal-src for each Python, linking libgdal
#                                  via gdal-config (Linux/macOS) or INCLUDE/LIB (MSVC)
#   4. repair                      auditwheel/delocate/delvewheel vendor the libs,
#                                  then ci/patch_wheel.py injects gdal_data/proj_data
#                                  and a runtime shim (sets GDAL_DATA/PROJ_DATA,
#                                  registers the DLL dir on Windows)

on:
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload wheels to PyPI? (0: no, 1: yes)'
        required: true
        default: '0'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  # Use github.ref so a new push to a branch cancels its prior in-progress run.
  # (head_ref is empty on push events, so the old fallback to run_id never
  # deduped pushes.)
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Single source of truth for the GDAL version. Bump this to ship a new GDAL.
  GDAL_VERSION: 3.13.0

jobs:

  # Pick the build matrix by trigger to control cost: push/PR iterate on Linux
  # x86_64 only (1x billing), while releases / manual dispatch / a "[full ci]"
  # commit run the full 6-platform matrix (macOS bills at 10x, Windows at 2x).
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          FULL='[{"os":"ubuntu-22.04","arch":"x86_64"},{"os":"ubuntu-22.04-arm","arch":"aarch64"},{"os":"macos-15-intel","arch":"x86_64","cmake_osx_architectures":"x86_64","macos_deployment_target":"15.0"},{"os":"macos-14","arch":"arm64","cmake_osx_architectures":"arm64","macos_deployment_target":"14.0"},{"os":"windows-2022","arch":"AMD64","triplet":"x64-windows","msvc_arch":"x64"},{"os":"windows-11-arm","arch":"ARM64","triplet":"arm64-windows","msvc_arch":"ARM64"}]'
          DEV='[{"os":"ubuntu-22.04","arch":"x86_64"},{"os":"windows-2022","arch":"AMD64","triplet":"x64-windows","msvc_arch":"x64"}]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "release" ] || printf '%s' "${{ github.event.head_commit.message }}" | grep -q '\[full ci\]'; then
            echo "matrix=$FULL" >> "$GITHUB_OUTPUT"; echo "Selected FULL matrix"
          else
            echo "matrix=$DEV" >> "$GITHUB_OUTPUT"; echo "Selected DEV matrix (linux x86_64 only)"
          fi

  build_wheels:
    needs: setup
    name: ${{ matrix.arch }} wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write        # SLSA build-provenance attestation (sign the wheels)
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch GDAL sdist + rename to gdal-wheels
        shell: bash
        run: bash ci/fetch_gdal_src.sh "$GDAL_VERSION"

      # --- Windows-only: provide libgdal via vcpkg (no from-source on MSVC) ---
      - name: Activate MSVC
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
           arch: ${{ matrix.msvc_arch }}
        if: ${{ matrix.msvc_arch }}

      - name: Bootstrap vcpkg
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
        run: |
          cd "$VCPKG_INSTALLATION_ROOT"
          git pull > nul
          ./bootstrap-vcpkg.bat -disableMetrics
        shell: bash
        if: ${{ matrix.msvc_arch }}

      - name: Install C deps via vcpkg
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
        run: |
          vcpkg install --feature-flags="versions,manifests" --x-manifest-root=$Env:GITHUB_WORKSPACE/ci --x-install-root=$Env:VCPKG_INSTALLATION_ROOT/installed
        shell: pwsh
        if: ${{ matrix.msvc_arch }}

      - name: Build libgdal 3.13.0 from source (Windows, MSVC + vcpkg deps)
        run: |
          python -m pip install ninja
          bash ci/build_gdal_windows.sh "$GDAL_VERSION" "${{ matrix.triplet }}" "C:/gdalinst"
        shell: bash
        if: ${{ matrix.msvc_arch }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: gdal-src
        env:
          CIBW_ENABLE: cpython-freethreading
          CIBW_SKIP: '*pp* *musllinux*'
          CIBW_ARCHS: ${{ matrix.arch }}

          # --- Build-time discovery of libgdal ---
          # Linux (hybrid via vcpkg): our libgdal in /opt/gdaldeps, its C deps in
          # the vcpkg install tree. gdal-config on PATH; both lib dirs on the
          # library path so the bindings link and auditwheel resolves deps.
          CIBW_ENVIRONMENT_LINUX: >-
            GDAL_VERSION=${{ env.GDAL_VERSION }}
            BUILD_PREFIX=/opt/gdaldeps
            PATH=/opt/gdaldeps/bin:$PATH
            LD_LIBRARY_PATH=/opt/gdaldeps/lib:/opt/gdaldeps/lib64:$LD_LIBRARY_PATH
          # macOS: config.sh installs into gdal_libs; put its bin on PATH so the
          # GDAL setup.py finds gdal-config (it calls the bare name, no env var).
          CIBW_ENVIRONMENT_MACOS: >-
            GDAL_VERSION=${{ env.GDAL_VERSION }}
            CMAKE_OSX_ARCHITECTURES='${{ matrix.cmake_osx_architectures }}'
            MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}
            BUILD_PREFIX=${GITHUB_WORKSPACE}/gdal_libs
            PATH=${GITHUB_WORKSPACE}/gdal_libs/bin:$PATH
            DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/gdal_libs/lib:$DYLD_LIBRARY_PATH
            LDFLAGS="${LDFLAGS} -arch ${{ matrix.arch }} -Wl,-rpath,${GITHUB_WORKSPACE}/gdal_libs/lib"
          # Windows/MSVC: setup.py returns before the gdal-config fallback, so the
          # compiler/linker rely on INCLUDE/LIB env vars. Point them at the libgdal
          # 3.13.0 we built from source (C:/gdalinst), so the bindings match.
          CIBW_ENVIRONMENT_WINDOWS: >-
            GDAL_VERSION=${{ env.GDAL_VERSION }}
            GDAL_INCLUDE_PATH="C:/gdalinst/include"
            GDAL_LIBRARY_PATH="C:/gdalinst/lib"
            INCLUDE="C:/gdalinst/include;$INCLUDE"
            LIB="C:/gdalinst/lib;$LIB"

          # Build libgdal + the full C dependency chain from source (Linux/macOS).
          CIBW_BEFORE_ALL_LINUX: |
            bash ./ci/build_gdal_hybrid.sh "$GDAL_VERSION" /opt/gdaldeps
          CIBW_BEFORE_ALL_MACOS: |
            bash ./ci/build_gdal_hybrid.sh "$GDAL_VERSION" "${GITHUB_WORKSPACE}/gdal_libs"
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel

          # Repair (vendor shared libs) then inject data + runtime shim.
          # Data dirs only exist inside the build env, so injection happens here.
          # NB: clean the repair dir each invocation. cibuildwheel reuses the
          # same job for every Python, and a glob over a shared dir would re-patch
          # (and re-emit) wheels from earlier Python builds -> "already generated".
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            export 'LD_LIBRARY_PATH=/opt/gdaldeps/lib64:/opt/gdaldeps/lib:$LD_LIBRARY_PATH' &&
            rm -rf /tmp/repaired && mkdir -p /tmp/repaired &&
            auditwheel repair -w /tmp/repaired {wheel} &&
            python {project}/ci/patch_wheel.py "/tmp/repaired/*.whl" {dest_dir}
            --gdal-data /opt/gdaldeps/share/gdal --proj-data /opt/gdaldeps/share/proj
            --licenses-src /opt/gdaldeps
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            export DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/gdal_libs/lib:$DYLD_LIBRARY_PATH &&
            rm -rf /tmp/repaired && mkdir -p /tmp/repaired &&
            delocate-wheel --require-archs {delocate_archs} -w /tmp/repaired -v {wheel} &&
            python {project}/ci/patch_wheel.py "/tmp/repaired/*.whl" {dest_dir}
            --gdal-data ${GITHUB_WORKSPACE}/gdal_libs/share/gdal --proj-data ${GITHUB_WORKSPACE}/gdal_libs/share/proj
            --licenses-src ${GITHUB_WORKSPACE}/gdal_libs
          # NB: no bash-isms here -- cibuildwheel runs the Windows repair in cmd.
          # cibuildwheel pre-cleans {dest_dir} per wheel, so delvewheel writes
          # there directly and patch_wheel patches it in place (one .whl).
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
            delvewheel repair --add-path "C:/gdalinst/bin;C:/vcpkg/installed/${{ matrix.triplet }}/bin" -w {dest_dir} {wheel} &&
            python {project}/ci/patch_wheel.py "{dest_dir}/*.whl" {dest_dir}
            --gdal-data C:/gdalinst/share/gdal --proj-data C:/vcpkg/installed/${{ matrix.triplet }}/share/proj
            --licenses-src C:/vcpkg/installed/${{ matrix.triplet }}

          # Smoke-test every wheel before it leaves the build.
          CIBW_TEST_REQUIRES: numpy pytest
          # Smoke gate + the functional correctness suite (raster/vector/CRS/GEOS/
          # Parquet/Arrow/Zarr/gdal_array round-trips with numeric assertions),
          # run against the installed wheel on every platform x Python.
          CIBW_TEST_COMMAND: >-
            python {project}/tests/test_smoke.py &&
            python -m pytest {project}/tests/test_functional.py -v

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

      # SLSA build provenance: cryptographically attest each wheel was built by
      # this workflow (verifiable with `gh attestation verify <wheel>`). Lets
      # consumers trust the binary's origin regardless of who/what authored the CI.
      - name: Attest wheel build provenance
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_wheels]
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/gdal-wheels/
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload == '1' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
